server:
  port: 8080

spring:
  config:
    import: "optional:file:./.env[.properties]"
  datasource:
    url: jdbc:mysql://localhost:3306/ai_learning?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver
  ai:
    dashscope:
      api-key: ${AI_DASHSCOPE_API_KEY:}

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true

ai:
  provider: dashscope

search:
  provider: firecrawl
  max-results: 5
  max-content-length: 12000
  api-key: ${FIRECRAWL_API_KEY:}

rag:
  provider: pgvector
  pgvector:
    dimensions: 1024
    datasource:
      url: jdbc:postgresql://localhost:5432/ai_learning_vector
      username: postgres
      password: 123456
